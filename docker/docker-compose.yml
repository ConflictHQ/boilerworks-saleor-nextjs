services:
  api:
    image: ghcr.io/saleor/saleor:3.22
    container_name: saleor-api
    ports:
      - "8000:8000"
    env_file:
      - backend.env
    environment:
      - DATABASE_URL=postgres://saleor:saleor@db:5432/saleor
      - CACHE_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,saleor-api
      - DASHBOARD_URL=http://localhost:9003/
      - DEFAULT_FROM_EMAIL=noreply@boilerworks.dev
      - EMAIL_URL=smtp://mailpit:1025
      - HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS=True
      - HTTP_IP_FILTER_ENABLED=True
      - DEFAULT_CHANNEL_SLUG=default-channel
    volumes:
      - saleor-media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  storefront:
    build:
      context: ../storefront
      dockerfile: Dockerfile.dev
    container_name: storefront
    ports:
      - "3000:3000"
    volumes:
      - ../storefront:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_SALEOR_API_URL=http://localhost:8000/graphql/
      - SALEOR_API_URL=http://api:8000/graphql/
      - NEXT_PUBLIC_STOREFRONT_URL=http://localhost:3000
      - NEXT_PUBLIC_DASHBOARD_URL=http://localhost:9003
      - NEXT_PUBLIC_DEFAULT_CHANNEL=default-channel
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:latest
    container_name: saleor-dashboard
    ports:
      - "9003:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    image: ghcr.io/saleor/saleor:3.22
    container_name: saleor-worker
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    env_file:
      - backend.env
    environment:
      - DATABASE_URL=postgres://saleor:saleor@db:5432/saleor
      - CACHE_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DEFAULT_FROM_EMAIL=noreply@boilerworks.dev
      - EMAIL_URL=smtp://mailpit:1025
      - HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS=True
      - HTTP_IP_FILTER_ENABLED=True
      - DEFAULT_CHANNEL_SLUG=default-channel
    volumes:
      - saleor-media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: saleor-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor
      - POSTGRES_DB=saleor
    volumes:
      - saleor-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saleor -d saleor"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: saleor-redis
    ports:
      - "6381:6379"
    volumes:
      - saleor-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: saleor-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  saleor-db:
  saleor-redis:
  saleor-media:
